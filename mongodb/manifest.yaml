apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    tire: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      tire: db
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        tire: db
    spec:
      containers:
      - name: mongodb
        image: aanitha/mongodb:v1